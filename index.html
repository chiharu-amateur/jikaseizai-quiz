<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自家製剤加算 ○×クイズ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card" id="startScreen">
      <p class="badge">薬局レセプト練習</p>
      <h1>自家製剤加算<br>○×クイズ</h1>
      <p class="lead">名前を入力してスタートしてください。</p>
      <label class="inputLabel" for="userName">回答者名</label>
      <input id="userName" class="textInput" type="text" placeholder="例：山田" autocomplete="name" />
      <p class="error hidden" id="nameError">名前を入力してください。</p>
      <button class="primary" id="startBtn" type="button">スタート</button>
    </section>

    <section class="card hidden" id="quizScreen">
      <div class="topbar">
        <span id="progress">1 / 10</span>
        <span id="scoreText">正解 0</span>
      </div>
      <p class="category" id="category"></p>
      <h2 id="questionText"></h2>
      <div class="answerButtons">
        <button class="answerBtn" id="trueBtn" type="button">○<span>算定できる</span></button>
        <button class="answerBtn" id="falseBtn" type="button">×<span>算定できない</span></button>
      </div>
      <div class="resultBox hidden" id="resultBox">
        <p id="judge"></p>
        <p id="explanation"></p>
        <button class="primary" id="nextBtn" type="button">次の問題へ</button>
      </div>
    </section>

    <section class="card hidden" id="finishScreen">
      <p class="badge">終了</p>
      <h1>結果</h1>
      <p class="bigScore" id="finalScore"></p>
      <p id="finalMessage"></p>
      <label class="inputLabel" for="difficulty">難易度を選んでください</label>
      <select id="difficulty" class="textInput">
        <option value="">選択してください</option>
        <option value="難しい">難しい</option>
        <option value="普通">普通</option>
        <option value="簡単">簡単</option>
      </select>
      <p class="error hidden" id="difficultyError">難易度を選んでください。</p>
      <button class="primary" id="submitBtn" type="button">結果を送信</button>
      <p class="sendStatus" id="sendStatus"></p>
      <button class="secondary" id="retryBtn" type="button">もう一度する</button>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
